<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Invoice Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #f0ece3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .toolbar button {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity .2s;
    }
    .toolbar button:hover { opacity: .85; }
    #btnAddRow   { background: #4a7c59; color: #fff; }
    #btnPrint    { background: #2c3e50; color: #fff; }

    /* ── Invoice card ── */
    #invoice {
      width: 340px;
      max-width: 100%;
      background: #f5f0e6;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(0,0,0,.18);
      position: relative;
    }

    /* top decorative area */
    .inv-header {
      background: #f5f0e6;
      padding: 12px 14px 0;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .deco-topleft {
      width: 160px;
      height: 160px;
      object-fit: contain;
      mix-blend-mode: multiply;
      flex-shrink: 0;
      margin-top: -40px;
      margin-left: -80px;
      transform: rotate(15deg);
    }

    /* pizza SVG placeholder */
    .deco-pizza {
      width: 180px;
      height: 180px;
      flex-shrink: 0;
      mix-blend-mode: multiply;
    }

    /* logo + invoice meta */
    .inv-meta {
      text-align: right;
      font-size: 10px;
      color: #333;
      padding-top: 4px;
    }
    .logo-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px dashed #888;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #888;
      margin-left: auto;
      margin-bottom: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .logo-circle input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .inv-meta .meta-row {
      margin-bottom: 3px;
    }
    .inv-meta span.label { font-weight: 600; color: #555; }

    /* INVOICE title band */
    .inv-title-band {
      padding: 0 14px 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .inv-title-band h1 {
      font-weight: 900;
      font-family: 'Playfair Display', serif;
      color: #2c2c2c;
      letter-spacing: -1px;
      line-height: 1;
      font-size: 22px;
    }
    .inv-date {
      font-size: 10px;
      font-weight: 600;
      color: #333;
      padding-bottom: 4px;
    }

    /* editable field */
    [contenteditable="true"] {
      outline: none;
      border-bottom: 1px dashed transparent;
      transition: border-color .2s;
    }
    [contenteditable="true"]:hover,
    [contenteditable="true"]:focus {
      border-bottom: 1px dashed #888;
      background: rgba(255,255,255,.45);
      border-radius: 2px;
    }

    /* ── Table ── */
    .inv-table-wrap {
      padding: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: #2c2c2c;
      color: #fff;
    }
    thead th {
      padding: 6px 8px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    thead th:first-child { text-align: left; }
    thead th:not(:first-child) { text-align: center; }

    tbody tr {
      border-bottom: 1px solid #ddd5c4;
    }
    tbody tr:nth-child(even) { background: rgba(255,255,255,.35); }
    tbody td {
      padding: 6px 8px;
      font-size: 10px;
      color: #222;
      font-weight: 600;
    }
    tbody td:first-child { text-align: left; }
    tbody td:not(:first-child) { text-align: center; }

    .unit-price, .qty-cell {
      min-width: 60px;
    }
    .total-cell { color: #333; }

    .del-btn {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
      display: none;
    }
    #invoice:hover .del-btn { display: inline; }

    /* ── Totals ── */
    .totals-section {
      display: flex;
      justify-content: flex-end;
      padding: 6px 8px 4px;
    }
    .totals-table {
      font-size: 10px;
      color: #333;
    }
    .totals-table td {
      padding: 3px 6px;
      text-align: right;
    }
    .totals-table td:first-child {
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .totals-row-total {
      background: #2c2c2c;
      color: #fff !important;
    }
    .totals-row-total td {
      padding: 6px 8px !important;
      font-weight: 900 !important;
      font-size: 11px !important;
      color: #fff !important;
      border-top: 8px solid transparent;
    }

    /* tax rate / discount inputs */
    #discountVal {
      width: 32px;
      border: 1px dashed #aaa;
      background: transparent;
      text-align: center;
      font-size: 10px;
      border-radius: 2px;
      padding: 1px 2px;
    }

    /* ── Bottom section ── */
    .inv-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 8px 10px 14px;
      gap: 8px;
    }
    .deco-burger {
      width: 80px;
      flex-shrink: 0;
    }
    .deco-bottom-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .deco-bottom {
      width: 110px;
      mix-blend-mode: multiply;
    }
    .deco-bottom-label {
      font-family: 'Dancing Script', cursive;
      font-size: 14px;
      font-weight: 700;
      color: #5a3e1b;
      letter-spacing: 1px;
      text-align: center;
      margin-top: -22px;
      margin-left: -18px;
    }
    .bank-details {
      flex: 1;
      font-size: 11px;
      color: #333;
    }
    .bank-block {
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #bbb;
    }
    .bank-block:last-child { border-bottom: none; margin-bottom: 0; }
    .bank-block .bank-name { font-weight: 700; margin-bottom: 4px; }
    .bank-block .bank-row  { margin-bottom: 2px; }

    /* ── Print styles ── */
    @media print {
      @page {
        size: 90mm auto;
        margin: 3mm;
      }
      html, body {
        width: 84mm;
        height: auto;
        background: #fff;
        padding: 0;
        margin: 0;
      }
      .toolbar { display: none !important; }
      #invoice {
        box-shadow: none;
        width: 84mm;
        max-width: 84mm;
        transform: none;
        background: #f5f0e6 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      [contenteditable] { border-bottom: none !important; background: transparent !important; }
      .del-btn { display: none !important; }
      #discountVal { border: none; }
      #invoice.discount-is-zero #discountRow { display: none; }
      .deco-pizza, .deco-burger { width: 80px !important; }
      .inv-title-band h1 { font-size: 36px !important; }
    }
  </style>
</head>

<script>
  // ── Default items ──
  const DEFAULT_ITEMS = [
    { name: 'Doner PIZZA',  price: 0, qty: 1 },
    { name: 'Patty Burger', price: 0, qty: 1 },
    { name: 'Hamburger',    price: 0, qty: 1 },
    { name: 'French Fries', price: 0, qty: 1 },
    { name: 'Hot Nugget',   price: 0, qty: 1 },
  ];

  function fmt(n) {
    return 'PKR ' + n.toFixed(2);
  }

  function calcRow(row) {
    const price = parseFloat(row.querySelector('.unit-price').innerText.replace(/[^0-9.]/g,'')) || 0;
    const qty   = parseFloat(row.querySelector('.qty-cell').innerText) || 0;
    const total = price * qty;
    row.querySelector('.total-cell').innerText = fmt(total);
    return total;
  }

  function recalcAll() {
    let sub = 0;
    document.querySelectorAll('#itemsBody tr').forEach(row => { sub += calcRow(row); });
    const discVal  = parseFloat(document.getElementById('discountVal').value) || 0;
    const discount  = sub * discVal / 100;
    const afterDisc = sub - discount;
    document.getElementById('subTotalDisplay').innerText = fmt(sub);
    document.getElementById('discountDisplay').innerText = '-' + fmt(discount);
    document.getElementById('totalDisplay').innerText    = fmt(afterDisc);
    document.getElementById('invoice').classList.toggle('discount-is-zero', discVal <= 0);
  }

  function addRow(name = 'New Item', price = 0, qty = 1) {
    const tbody = document.getElementById('itemsBody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td contenteditable="true">${name}</td>
      <td contenteditable="true" class="unit-price">${fmt(price)}</td>
      <td contenteditable="true" class="qty-cell">${qty}</td>
      <td class="total-cell">${fmt(price * qty)}</td>
      <td><button class="del-btn" title="Remove row">✕</button></td>
    `;
    // recalc on edit
    tr.querySelectorAll('[contenteditable]').forEach(el => {
      el.addEventListener('input', recalcAll);
      el.addEventListener('blur', () => {
        // normalise price format
        if (el.classList.contains('unit-price')) {
          const v = parseFloat(el.innerText.replace(/[^0-9.]/g,'')) || 0;
          el.innerText = fmt(v);
        }
      });
    });
    tr.querySelector('.del-btn').addEventListener('click', () => {
      tr.remove();
      recalcAll();
    });
    tbody.appendChild(tr);
    recalcAll();
  }

  function buildDefault() {
    document.getElementById('itemsBody').innerHTML = '';
    DEFAULT_ITEMS.forEach(i => addRow(i.name, i.price, i.qty));
  }

  // init
  buildDefault();

  document.getElementById('btnAddRow').addEventListener('click', () => addRow());
  document.getElementById('btnPrint').addEventListener('click', () => window.print());
  document.getElementById('discountVal').addEventListener('input', recalcAll);
  window.addEventListener('beforeprint', recalcAll);

</script>
